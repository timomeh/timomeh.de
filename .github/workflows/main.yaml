name: main
on:
  push:
    branches: [main]

# Limit the concurrency of the whole main pipeline to prevent
# race conditions in back-to-back workflow runs
concurrency:
  group: deploy_production

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml
    secrets: inherit

  publish-release:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    needs: ci
    environment:
      name: production
      url: https://timomeh.de
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp
      - name: load image
        run: docker load -i /tmp/docker-image.tar
      - name: publish image
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      - name: resolve image digest
        id: image
        run: |
          digest=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: release
        env:
          GH_TOKEN: ${{ secrets.HILLSIDE_DISPATCH_TOKEN }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.image.outputs.digest }}
        run: |
          gh api \
            --method POST \
            /repos/timomeh/hillside/dispatches \
            -f event_type=deploy-app \
            -f client_payload[app]=timomeh \
            -f client_payload[environment]=prod \
            -f client_payload[image]="$IMAGE" \
            -f client_payload[job]=premigrate \
            -f client_payload[source_repository]="${{ github.repository }}" \
            -f client_payload[source_sha]="${{ github.sha }}"

name: ci
on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: pnpm/action-setup@v6.0.8
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm run lint
      - run: pnpm run fmt:check
        if: always()

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: tools/Dockerfile
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
      - run: docker save -o /tmp/docker-image.tar ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      - uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/docker-image.tar
          retention-days: 1

  test:
    needs: build
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://user:pass@localhost:3031/blog
      POSTGRES_DUMP_PATH: data/ci/postgres.dump
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: pnpm/action-setup@v6.0.8
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm exec playwright install --with-deps chromium --only-shell

      # Restore caches
      - run: mkdir -p data/ci
      - name: Restore cached Postgres dump
        id: postgres-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: ${{ env.POSTGRES_DUMP_PATH }}
          key: ${{ runner.os }}-postgres-v3-${{ hashFiles('drizzle/**/*.sql', 'drizzle/meta/*.json') }}
          restore-keys: |
            ${{ runner.os }}-postgres-v3-

      # Load docker image from previous build stage
      - name: download docker image to /tmp/docker-image.tar
        uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp
      - run: docker load -i /tmp/docker-image.tar

      # Start the server
      - name: Export secrets
        run: |
          echo "" >> .env.local
          echo "GITHUB_CONTENT_PAT=${{ secrets.BLOG_GH_ACCESS_TOKEN }}" >> .env.local
      - run: docker compose --profile e2e up -d --wait
      - name: Restore Postgres dump
        if: steps.postgres-cache.outputs.cache-matched-key != ''
        run: |
          docker cp "${POSTGRES_DUMP_PATH}" "$(docker compose ps -q db):/tmp/postgres.dump"
          docker compose exec -T db pg_restore --clean --if-exists --no-owner -U user -d blog /tmp/postgres.dump
      - run: pnpm db:migrate
      # Run tests
      - run: pnpm test
        env:
          PLAYWRIGHT_WEB_SERVER: off
          UPLOAD_TO_ARGOS: 1
          NUKE_SECRET: test

      # Save caches
      - name: Dump Postgres data
        if: success() && steps.postgres-cache.outputs.cache-hit != 'true'
        run: |
          docker compose exec -T db pg_dump -U user -d blog --format=custom --no-owner --no-privileges --file=/tmp/postgres.dump
          docker cp "$(docker compose ps -q db):/tmp/postgres.dump" "${POSTGRES_DUMP_PATH}"
      - name: Save Postgres dump
        if: success() && steps.postgres-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5.0.5
        with:
          path: ${{ env.POSTGRES_DUMP_PATH }}
          key: ${{ steps.postgres-cache.outputs.cache-primary-key }}

      # Post-test
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
      - run: docker compose logs --no-color --timestamps app db content-proxy images
        if: always()
      - run: docker compose --profile dev --profile e2e down
        if: failure() || success()

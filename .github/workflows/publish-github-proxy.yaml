name: Publish GitHub Private Proxy

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-github-proxy.yaml
      - tools/github-private-reverse-proxy/**

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-content-proxy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: tools/github-private-reverse-proxy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ secrets.HILLSIDE_DISPATCH_TOKEN }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          gh api \
            --method POST \
            /repos/timomeh/hillside/dispatches \
            -f event_type=deploy-app \
            -f client_payload[app]=timomeh \
            -f client_payload[environment]=prod \
            -f client_payload[image]="$IMAGE" \
            -f client_payload[source_repository]="${{ github.repository }}" \
            -f client_payload[source_sha]="${{ github.sha }}"
